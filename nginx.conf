# nginx.conf
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 443 ssl;

        listen 80;
        server_name no-mess.com;
        ssl_certificate /etc/ssl/no-mess.crt;
        ssl_certificate_key /etc/ssl/no-mess.key;
        root /usr/share/nginx/html;
        index index.html;

        # Для SPA (Vue/React) - все пути ведут на index.html
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Кеширование статики
        location /assets {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}