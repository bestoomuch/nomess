version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: nomess-web
    ports:
      - "8080:80"
    volumes:
      # Монтируем собранные файлы
      - ./dist:/usr/share/nginx/html:ro
      # Монтируем конфиг nginx
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/ssl/:/etc/ssl/:ro
    restart: unless-stopped
    networks:
      - nomess-network

networks:
  nomess-network:
    driver: bridge